name: Deploy Flask app
on: 
  workflow_dispatch:
jobs:
 
  deploy:
    environment:
      DOCKERHUB_USER: ${{ vars.DOCKERHUB_USER }}
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Deploy with docker compose
        run: docker compose up -d --build
